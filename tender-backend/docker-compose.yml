services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - log_archive:/app/logs/archive
    group_add:
      - ${DOCKER_GID:-999}
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - postgres
      - redis

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - log_archive:/app/logs/archive
    group_add:
      - ${DOCKER_GID:-999}
    env_file: .env
    depends_on:
      - postgres
      - redis

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tenderiq
      POSTGRES_PASSWORD: tenderiq
      POSTGRES_DB: tenderiq
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenderiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass tenderiq_redis_2024
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "tenderiq_redis_2024", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tenderiq.uz
      PGADMIN_DEFAULT_PASSWORD: TenderIQ_Admin_2024!
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - postgres

  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    command: celery -A app.tasks.celery_app flower --port=5555 --basic-auth=admin:TenderIQ_Flower_2024!
    ports:
      - "127.0.0.1:5555:5555"
    env_file: .env
    depends_on:
      - redis

volumes:
  postgres_data:
  log_archive:
