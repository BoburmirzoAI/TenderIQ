<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; background: #f4f6f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .wrapper { max-width: 600px; margin: 0 auto; background: #ffffff; }
    .header { background: #1a56db; padding: 24px 32px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 22px; letter-spacing: 1px; }
    .content { padding: 32px; color: #1f2937; line-height: 1.6; }
    .content h2 { color: #1a56db; font-size: 18px; margin: 0 0 16px; }
    .tender-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .tender-card .title { font-weight: 600; color: #111827; margin-bottom: 6px; }
    .tender-card .meta { font-size: 13px; color: #6b7280; }
    .tender-card .score { display: inline-block; background: #dbeafe; color: #1e40af; font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
    .tender-card .amount { font-weight: 600; color: #059669; }
    .btn { display: inline-block; background: #1a56db; color: #ffffff; text-decoration: none; padding: 12px 28px; border-radius: 6px; font-weight: 600; margin-top: 16px; }
    .stats-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    .stats-table td { padding: 8px 12px; border-bottom: 1px solid #e5e7eb; }
    .stats-table td:first-child { color: #6b7280; }
    .stats-table td:last-child { font-weight: 600; text-align: right; }
    .footer { background: #f9fafb; padding: 20px 32px; text-align: center; font-size: 12px; color: #9ca3af; border-top: 1px solid #e5e7eb; }
    .footer a { color: #1a56db; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>TenderIQ</h1>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>&copy; {{ year }} TenderIQ. Barcha huquqlar himoyalangan.</p>
      <p>
        <a href="{{ app_url }}/settings">Bildirishnoma sozlamalari</a>
      </p>
    </div>
  </div>
</body>
</html>
